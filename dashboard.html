<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard Utente</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stile.css">
</head>
<body class="sfondo">
    <nav class="navbar navbar-expand-sm fixed-top" style="background-color: #1a1a1a;">
        <div class="container-fluid">
            <a class="logo navbar-brand fs-1 fw-bold" href="index.html">D8</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span>
                    <img src="navbartop.png" alt="Menu" style="height: 30px; width: auto;">
                </span>
            </button>
        </div>
        <div class="collapse navbar-collapse" id="mynavbar">
            <form class="d-flex">
                <a class="bottone btn btn-outline-info" href="profile.html" type="button">Profilo</a>
                <a class="bottonelog btn btn-outline-info" href="index.html" type="button">Logout</a>
            </form>
        </div>
    </nav>
    <div class="pt-5 mt-2"></div>
    <div class="container">
        <div class="row contenitorigrossi pt-3 mt-5">
            <div class="container pt-3 mt-3 col-sm-12">
                <h2 class="testo fw-bold">Dashboard Utente</h2>
                <div class="alert alert-info mt-4" role="alert">
                    <h4 class="alert-heading">Aggiorna le tue statistiche!</h4>
                    <p>Inserisci cosa hai mangiato oggi e aggiorna le tue statistiche giornaliere.</p>
                    <hr>
                    <form>
                        <div class="mb-3">
                            <label for="meal" class="form-label">Cosa hai mangiato oggi?</label>
                            <input type="text" class="form-control" id="meal" placeholder="Es. Pasta, Insalata, Frutta" required>
                        </div>
                        <div class="mb-3">
                            <label for="steps" class="form-label">Passi effettuati:</label>
                            <input type="number" class="form-control" id="steps" placeholder="Es. 5000" required>
                        </div>
                        <div class="mb-3">
                            <label for="mood" class="form-label">Umore:</label>
                            <select class="form-select" id="mood" required>
                                <option value="" disabled selected>Seleziona il tuo umore</option>
                                <option value="felice">Felice</option>
                                <option value="triste">Triste</option>
                                <option value="stressato">Stressato</option>
                                <option value="rilassato">Rilassato</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-outline-info">Aggiorna Statistiche</button>
                    </form>
                </div>
                <div class="mt-5">
                    <h3 class="testo fw-bold">Le tue statistiche</h3>
                    <ul class="list-group mt-3">
                        <li class="list-group-item">Passi di oggi: <span id="stat-steps">5000</span></li>
                        <li class="list-group-item">Umore: <span id="stat-mood">Felice</span></li>
                        <li class="list-group-item">Cibo consumato: <span id="stat-meal">Pasta, Insalata, Frutta</span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
